{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>Enviar novo arquivo</h2>
    <a href="/logout" class="btn btn-secondary">🚪 Sair</a>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('code')">💻 Colar Código</div>
    <div class="tab" onclick="switchTab('file')">📁 Enviar Arquivo</div>
</div>

<div id="code-form" class="box">
    <form id="pasteForm">
        <input type="text" name="title" placeholder="Título do código (opcional)">
        
        <select name="language">
            <option value="auto">🔍 Auto-detectar linguagem</option>
            <option value="python">🐍 Python</option>
            <option value="javascript">📜 JavaScript</option>
            <option value="html">🌐 HTML</option>
            <option value="css">🎨 CSS</option>
            <option value="java">☕ Java</option>
            <option value="cpp">⚡ C++</option>
            <option value="bash">🐚 Bash/Shell</option>
            <option value="sql">🗄️ SQL</option>
            <option value="json">📋 JSON</option>
            <option value="php">🐘 PHP</option>
            <option value="go">🔵 Go</option>
            <option value="rust">⚙️ Rust</option>
            <option value="text">📝 Texto puro</option>
        </select>
        
        <textarea name="code" placeholder="Cole seu código aqui..." required></textarea>
        
        <button type="submit" class="btn">Criar Link Compartilhável</button>
    </form>
</div>

<div id="file-form" class="box hidden">
    <form id="uploadForm" enctype="multipart/form-data">
        <input type="text" name="title" placeholder="Nome do arquivo (opcional)">
        
        <div class="file-drop" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <p>📎 Clique para selecionar ou arraste arquivos aqui</p>
            <p style="font-size: 12px; color: #8b949e; margin-top: 10px;">Máx: 50MB • Qualquer formato • Salvo para sempre</p>
            <input type="file" id="fileInput" name="file" style="display: none;" required>
            <p id="fileName" style="margin-top: 10px; color: #58a6ff;"></p>
        </div>
        
        <button type="submit" class="btn">Enviar Arquivo</button>
    </form>
</div>

<div id="result" class="hidden">
    <div class="success-msg">
        <h3>✅ Salvo para sempre!</h3>
        <p>Seu link permanente:</p>
        <div class="url-box" id="urlBox"></div>
        <button class="btn btn-secondary" onclick="copyUrl()">📋 Copiar</button>
        <a id="viewLink" href="#" class="btn">🔗 Acessar</a>
    </div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    
    if (tab === 'code') {
        document.getElementById('code-form').classList.remove('hidden');
        document.getElementById('file-form').classList.add('hidden');
    } else {
        document.getElementById('code-form').classList.add('hidden');
        document.getElementById('file-form').classList.remove('hidden');
    }
}

const dropZone = document.getElementById('dropZone');
dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
dropZone.ondragleave = () => dropZone.classList.remove('dragover');
dropZone.ondrop = (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    document.getElementById('fileInput').files = e.dataTransfer.files;
    updateFileName();
};

document.getElementById('fileInput').onchange = updateFileName;
function updateFileName() {
    const file = document.getElementById('fileInput').files[0];
    if (file) document.getElementById('fileName').textContent = `📄 ${file.name}`;
}

document.getElementById('pasteForm').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const res = await fetch('/upload', {method: 'POST', body: formData});
    const data = await res.json();
    if(data.success) showResult(data.url);
    else alert('Erro: ' + data.error);
};

document.getElementById('uploadForm').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const res = await fetch('/upload', {method: 'POST', body: formData});
    const data = await res.json();
    if(data.success) showResult(data.url);
    else alert('Erro: ' + data.error);
};

function showResult(url) {
    document.getElementById('urlBox').textContent = url;
    document.getElementById('viewLink').href = url;
    document.getElementById('result').classList.remove('hidden');
    document.getElementById('result').scrollIntoView({behavior: 'smooth'});
}

function copyUrl() {
    navigator.clipboard.writeText(document.getElementById('urlBox').textContent);
    alert('Link copiado!');
}
</script>
{% endblock %}
