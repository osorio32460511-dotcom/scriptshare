<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScriptShare - Compartilhe Códigos e Arquivos{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0d1117; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { 
            background: #161b22; 
            border-bottom: 1px solid #30363d;
            padding: 20px 0;
            margin-bottom: 30px;
        }
        header h1 { color: #58a6ff; font-size: 24px; display: inline; }
        header p { color: #8b949e; display: inline; margin-left: 10px; }
        .btn {
            display: inline-block;
            background: #238636;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover { background: #2ea043; }
        .btn-secondary {
            background: #21262d;
            border: 1px solid #30363d;
        }
        .btn-secondary:hover { background: #30363d; }
        .box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-family: inherit;
            margin-bottom: 16px;
        }
        textarea { min-height: 300px; font-family: 'Consolas', monospace; resize: vertical; }
        .tabs { display: flex; border-bottom: 1px solid #30363d; margin-bottom: 20px; }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: #8b949e;
        }
        .tab.active {
            color: #58a6ff;
            border-bottom-color: #58a6ff;
        }
        .hidden { display: none; }
        .url-box {
            background: #0d1117;
            border: 1px solid #238636;
            padding: 15px;
            border-radius: 6px;
            word-break: break-all;
            margin: 10px 0;
            font-family: monospace;
            color: #58a6ff;
        }
        .success-msg {
            background: rgba(35, 134, 54, 0.1);
            border: 1px solid #238636;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .file-drop {
            border: 2px dashed #30363d;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-drop:hover, .file-drop.dragover {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.1);
        }
        footer {
            text-align: center;
            padding: 40px 0;
            color: #8b949e;
            border-top: 1px solid #30363d;
            margin-top: 60px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1>🚀 ScriptShare</h1>
            <p>Salvo para sempre • Sem expiração</p>
        </div>
    </header>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <footer>
        <div class="container">
            <p>💾 Todos os arquivos e códigos são salvos permanentemente</p>
        </div>
    </footer>
    
    {% block scripts %}{% endblock %}
</body>
</html>
